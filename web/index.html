<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!--
    Firebase Hosting / subdirectory deploy: pass --base-href when building, e.g.
    flutter build web --release --base-href=/myapp/
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="Farm Assistant — لوحة تحكم المزرعة الذكية">

  <!-- Optional: Web OAuth client ID for Google Sign-In (Firebase Console → Authentication → Google → Web SDK).
       Or build with: flutter build web --dart-define=GOOGLE_WEB_CLIENT_ID=your-id.apps.googleusercontent.com -->
  <!-- <meta name="google-signin-client_id" content="YOUR_WEB_CLIENT_ID.apps.googleusercontent.com"> -->

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Farm Assistant">
  <meta name="theme-color" content="#261A14">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Farm Assistant</title>
  <link rel="manifest" href="manifest.json">

  <!-- Safari / iOS WebView: full viewport + background before Flutter paints -->
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background-color: #261A14; }
    body { -webkit-text-size-adjust: 100%; }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
